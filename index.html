<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康体检合格证明</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #F0F8FF;
            font-family: "宋体", SimSun, serif;
        }

        .cert-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
            border-bottom: 2px solid #1E90FF;
            padding-bottom: 10px;
        }

        .photo-section {
            width: 200px;
            height: 260px;
            border: 1px solid #999;
            margin: 0 auto 20px;
            padding: 5px;
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        .info-table td {
            padding: 8px 15px;
            border-bottom: 1px solid #EEE;
        }

        .info-label {
            width: 120px;
            color: #666;
        }

        .valid-period {
            color: #333;
            margin: 20px 0;
            font-weight: bold;
        }

        .issuer {
            color: #FF0000;
            text-align: center;
            font-size: 15px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #CCC;
        }
    </style>
</head>
<body>
    <div class="cert-container">
        <div class="header">沈阳市从业人员健康体检合格证明</div>
        
        <div class="photo-section">
            <img src="avatar.jpg" alt="证件照" class="photo">
        </div>

        <table class="info-table">
            <tr>
                <td class="info-label">姓　　名：</td>
                <td>张运范</td>
            </tr>
            <tr>
                <td class="info-label">性　　别：</td>
                <td>女</td>
            </tr>
            <tr>
                <td class="info-label">年　　龄：</td>
                <td>62</td>
            </tr>
            <tr>
                <td class="info-label">健康证号：</td>
                <td>70251005285</td>
            </tr>
            <tr>
                <td class="info-label">从　　业：</td>
                <td>食品</td>
            </tr>
            <tr>
                <td class="info-label">单　　位：</td>
                <td>个人</td>
            </tr>
        </table>

        <div class="valid-period">
            有效期：2025年03月16日到2026年03月15日
        </div>

        <div class="issuer">
            制证单位：众康（沈阳）综合门诊有限公司健康综合门诊部
        </div>
    </div>
</body>
</html>
