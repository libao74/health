<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康体检合格证明</title>
    <style>
        .photo-section {
  margin: 0 auto 20px;  /* 照片居中显示在标题下方 */
}

.info-section {
  width: 60%;          /* 信息区域居中缩进 */
}
        /* 精确还原原图样式 */
        body {
            margin: 0;
            padding: 20px;
            background: #FFFFFF;
            font-family: "微软雅黑", sans-serif;
        }

        .cert-container {
            width: 800px;
            margin: 0 auto;
            border: 1px solid #E0E0E0;
            padding: 25px;
        }

        .header {
            text-align: center;
            font-size: 22px;
            color: #333333;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .photo-section {
            width: 200px;
            height: 260px;
            border: 1px solid #CCCCCC;
            margin: 0 auto 20px;
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-section {
            font-size: 14px;
            color: #333333;
            line-height: 1.8;
            width: 60%;
            margin: 0 auto;
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
        }

        .info-label {
            width: 80px;
            font-weight: normal;
        }

        .valid-period {
            margin: 25px 0;
            text-align: center;
            font-size: 14px;
        }

        .issuer {
            color: #FF0000;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="cert-container">
        <div class="header">沈阳市从业人员健康体检合格证明</div>

        <!-- 照片区域（位于姓名上方） -->
        <div class="photo-section">
            <img src="avatar.jpg" alt="证件照" class="photo">
        </div>

        <!-- 信息区域 -->
        <div class="info-section">
            <div class="info-row">
                <span class="info-label">姓名：</span>
                <span>张运范</span>
            </div>
            <div class="info-row">
                <span class="info-label">性别：</span>
                <span>女</span>
            </div>
            <div class="info-row">
                <span class="info-label">年龄：</span>
                <span>62</span>
            </div>
            <div class="info-row">
                <span class="info-label">健康证号：</span>
                <span>70251005285</span>
            </div>
            <div class="info-row">
                <span class="info-label">行业：</span>
                <span>食品</span>
            </div>
        </div>

        <!-- 有效期 -->
        <div class="valid-period">
            有效期：2025年03月16日到2026年03月15日
        </div>

        <!-- 制证单位 -->
        <div class="issuer">
            制证单位：众康（沈阳）综合门诊有限公司
        </div>
    </div>
</body>
</html>
